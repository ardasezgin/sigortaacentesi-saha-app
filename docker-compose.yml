version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: aksiyon-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aksiyon_db}
      POSTGRES_USER: ${POSTGRES_USER:-aksiyon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env.production}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aksiyon_user} -d ${POSTGRES_DB:-aksiyon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aksiyon-network

  # Backend API
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aksiyon-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-aksiyon_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aksiyon_db}
      PORT: 3000
      HOST: 0.0.0.0
      CLICKUP_API_TOKEN: ${CLICKUP_API_TOKEN:?Please set CLICKUP_API_TOKEN in .env.production}
      SESSION_SECRET: ${SESSION_SECRET:?Please set SESSION_SECRET in .env.production}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/trpc/system.health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aksiyon-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  aksiyon-network:
    driver: bridge
